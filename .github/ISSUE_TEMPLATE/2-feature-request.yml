name: Feature request
description: Suggest a new feature or improvement for LaraSkills
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a new skill, rule, agent, knowledge domain, CLI feature, or any other improvement.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the gap or pain point you're experiencing.
      placeholder: "When building X, the agent produces Y because there is no guidance on Z..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like LaraSkills to provide?
      placeholder: "A new skill covering ... or a rule that enforces ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New skill
        - New rule
        - New agent
        - Knowledge unit
        - CLI / retrieval
        - MCP server
        - Documentation
        - Other
    validations:
      required: true
