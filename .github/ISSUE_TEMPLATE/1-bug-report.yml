name: Bug report
description: Report a bug or unexpected behavior in LaraSkills
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you provide, the faster we can diagnose and fix it.

  - type: input
    id: version
    attributes:
      label: LaraSkills version
      description: Which version are you running? (`npx laraskills --version` or check `package.json`)
      placeholder: "1.0.0-beta.17"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect to happen?
      placeholder: "When I run `npx laraskills retrieve ...` the output is cut off after..."
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal, reproducible steps.
      placeholder: |
        1. `npm install --save-dev laraskills@beta`
        2. `npx laraskills install --profile core`
        3. Run `npx laraskills retrieve "..." --mode compact`
        4. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error messages, stack traces, or unexpected output. Use `--format json` where available.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Laravel version, PHP version, AI tool in use (if applicable)
      placeholder: "Laravel 13, PHP 8.3, OpenCode v0.x / Claude Code / Cursor"
